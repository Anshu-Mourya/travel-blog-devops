version: '3'

services:

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"

  backend:
    build: ./Backend
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/travelDB
      - PORT=5001
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    ports:
      - "27017:27017"