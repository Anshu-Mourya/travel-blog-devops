version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: travel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./Backend
    container_name: travel-backend
    ports:
      - "5001:5001"
    env_file:
      - ./Backend/.env
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/travel-blog

volumes:
  mongo-data: