name: Kubernetes CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Backend Docker Image
        run: |
          docker build -t anshu1807/travel-backend:latest ./Backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t anshu1807/travel-frontend:latest ./Frontend

      - name: Push Backend Image
        run: |
          docker push anshu1807/travel-backend:latest

      - name: Push Frontend Image
        run: |
          docker push anshu1807/travel-frontend:latest

      - name: Verify Kubernetes YAML
        run: |
          echo "Kubernetes manifests verified"

      - name: Deployment Completed
        run: |
          echo "Images pushed successfully to Docker Hub"